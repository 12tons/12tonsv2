<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sorteador de Tonalidades</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 15px;
  background-color: #f4f6f8;
}

h1 {
  font-size: 24px;
}

button {
  margin: 4px;
  padding: 8px 12px;
  font-size: 14px;
}

#sortear {
  margin-top: 10px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #d62828;
  color: #ffd60a;
  border: none;
}

#resultado {
  font-size: 34px;
  margin-top: 10px;
}

#ciclo {
  margin-top: 10px;
  font-size: 16px;
  text-align: left;
  max-width: 500px;
  margin-inline: auto;
}
</style>
</head>

<body>

<h1>Sorteador de Tonalidades</h1>

<div>
  <button onclick="selecionar('maior')">Maiores</button>
  <button onclick="selecionar('menor')">Menores</button>
</div>

<div id="submenuMenor" style="display:none;">
  <button onclick="setMenorModo('natural')">Menor natural</button>
  <button onclick="setMenorModo('harmonica')">Menor harmônica</button>
</div>

<div>
  <button onclick="setModo('quintas')">Quintas</button>
  <button onclick="setModo('quartas')">Quartas</button>
  <button onclick="setModo('cromaticoAsc')">Crom ↑</button>
  <button onclick="setModo('cromaticoDesc')">Crom ↓</button>
</div>

<button id="sortear" onclick="sortear()">Sortear</button>

<div id="resultado">—</div>
<div id="ciclo"></div>

<script>

// sistema cromático
const notas = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

// intervalos
const maior = [0,2,4,5,7,9,11];
const menorNat = [0,2,3,5,7,8,10];
const menorHar = [0,2,3,5,7,8,11];

let listaAtual=[];
let embaralhadas=[];
let modo="quintas";
let menorModo="natural";

// ciclo base
const ciclo = ["C","G","D","A","E","B","F#","C#","G#","D#","A#","F"];

function selecionar(tipo){
  if(tipo==="maior"){
    listaAtual=ciclo;
    document.getElementById("submenuMenor").style.display="none";
  } else {
    listaAtual=ciclo.map(n=>n+"m");
    document.getElementById("submenuMenor").style.display="block";
  }
  iniciar();
}

function setModo(m){modo=m;}
function setMenorModo(m){menorModo=m;}

function iniciar(){
  embaralhadas=[...listaAtual];
  embaralhar(embaralhadas);
}

function embaralhar(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

// cria escala
function criarEscala(tonica,intervalos){
  let base=tonica.replace("m","");
  let idx=notas.indexOf(base);
  return intervalos.map(i=>notas[(idx+i)%12]);
}

// campo harmônico
function campo(tonica){

  if(!tonica.includes("m")){
    let escala=criarEscala(tonica,maior);
    return [
      escala[0],
      escala[1]+"m",
      escala[2]+"m",
      escala[3],
      escala[4]+"7",
      escala[5]+"m",
      escala[6]+"°"
    ];
  }

  let esc;

  if(menorModo==="natural"){
    esc=criarEscala(tonica,menorNat);
    return [
      esc[0]+"m",
      esc[1]+"°",
      esc[2],
      esc[3]+"m",
      esc[4]+"m",
      esc[5],
      esc[6]
    ];
  }

  esc=criarEscala(tonica,menorHar);

  return [
    esc[0]+"m",
    esc[1]+"°",
    esc[2]+"(#5)",
    esc[3]+"m",
    esc[4]+"7",
    esc[5],
    esc[6]+"°"
  ];
}

// ciclo
function gerarCiclo(t){
  let base=listaAtual;
  let i=base.indexOf(t);
  let out=[];

  for(let k=0;k<base.length;k++){
    let pos=(modo==="quartas")
      ? (i-k+12)%12
      : (i+k)%12;

    out.push(base[pos]);
  }

  return out;
}

function sortear(){

  if(embaralhadas.length===0){
    document.getElementById("resultado").innerText="Fim";
    return;
  }

  let t=embaralhadas.pop();
  document.getElementById("resultado").innerText=t;

  let ciclo=gerarCiclo(t);

  let html="";

  ciclo.forEach((ton,i)=>{
    let ch=campo(ton);
    html+=`<div><b>${ton}</b> → ${ch.join(" ")}</div>`;
  });

  document.getElementById("ciclo").innerHTML=html;
}

selecionar("maior");

</script>

</body>
</html>
