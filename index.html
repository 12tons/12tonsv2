<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sorteador de Tonalidades</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 15px;
  background-color: #f4f6f8;
}

h1 { font-size: 24px; }

button {
  margin: 4px;
  padding: 8px 12px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #555;
  background: white;
  cursor: pointer;
}

button:hover { background: #eaeaea; }

.ativo {
  background: #222;
  color: white;
}

#sortear {
  margin-top: 10px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #d62828;
  color: #ffd60a;
  border: none;
  font-size: 18px;
}

#resultado {
  font-size: 34px;
  margin-top: 10px;
}

#ciclo {
  margin-top: 10px;
  font-size: 32px;
  line-height: 1.4;
  text-align: left;
  max-width: 900px;
  margin-inline: auto;
}
</style>
</head>

<body>

<h1>Sorteador de Tonalidades</h1>

<div>
  <button id="btn-maior" onclick="selecionar('maior')">Maiores</button>
  <button id="btn-menor" onclick="selecionar('menor')">Menores</button>
</div>

<div id="submenuMenor" style="display:none;">
  <button id="btn-natural" onclick="setMenorModo('natural')">Menor natural</button>
  <button id="btn-harmonica" onclick="setMenorModo('harmonica')">Menor harmônica</button>
</div>

<div>
  <button id="btn-quintas" onclick="setModo('quintas')">Quintas</button>
  <button id="btn-quartas" onclick="setModo('quartas')">Quartas</button>
  <button id="btn-cromA" onclick="setModo('cromaticoAsc')">Crom ↑</button>
  <button id="btn-cromD" onclick="setModo('cromaticoDesc')">Crom ↓</button>
</div>

<button id="sortear" onclick="sortear()">Sortear</button>

<div id="resultado">—</div>
<div id="ciclo"></div>

<script>

const letras = ["C","D","E","F","G","A","B"];
const semitons = {"C":0,"D":2,"E":4,"F":5,"G":7,"A":9,"B":11};

function notaComAlteracao(letra, alvo){
  let base = semitons[letra];
  let diff = (alvo - base + 12) % 12;

  if(diff === 0) return letra;
  if(diff === 1) return letra + "#";
  if(diff === 11) return letra + "b";

  return letra;
}

function construirEscala(tonica, tipo){

  let base = tonica.replace("m","");
  let letraBase = base[0];
  let idxLetra = letras.indexOf(letraBase);

  let intervalos;

  if(tipo === "maior") intervalos = [0,2,4,5,7,9,11];
  if(tipo === "menorNat") intervalos = [0,2,3,5,7,8,10];
  if(tipo === "menorHar") intervalos = [0,2,3,5,7,8,11];

  let baseSemitom = semitons[letraBase];
  if(base.includes("#")) baseSemitom++;
  if(base.includes("b")) baseSemitom--;

  let escala = [];

  for(let i=0;i<7;i++){
    let letra = letras[(idxLetra+i)%7];
    let alvo = (baseSemitom + intervalos[i]) % 12;
    escala.push(notaComAlteracao(letra, alvo));
  }

  return escala;
}

function campo(tonica){

  if(!tonica.includes("m")){
    let esc = construirEscala(tonica,"maior");
    return [
      esc[0],
      esc[1]+"m",
      esc[2]+"m",
      esc[3],
      esc[4]+"7",
      esc[5]+"m",
      esc[6]+"°"
    ];
  }

  if(menorModo==="natural"){
    let esc = construirEscala(tonica,"menorNat");
    return [
      esc[0]+"m",
      esc[1]+"°",
      esc[2],
      esc[3]+"m",
      esc[4]+"m",
      esc[5],
      esc[6]
    ];
  }

  let esc = construirEscala(tonica,"menorHar");

  return [
    esc[0]+"m",
    esc[1]+"°",
    esc[2]+"(#5)",
    esc[3]+"m",
    esc[4]+"7",
    esc[5],
    esc[6]+"°"
  ];
}

const ciclo = ["C","G","D","A","E","B","F#","Db","Ab","Eb","Bb","F"];

let listaAtual=[];
let embaralhadas=[];
let modo="quintas";
let menorModo="natural";

function limparAtivos(ids){
  ids.forEach(id => document.getElementById(id).classList.remove("ativo"));
}

function selecionar(tipo){

  limparAtivos(["btn-maior","btn-menor"]);

  if(tipo==="maior"){
    listaAtual=ciclo;
    document.getElementById("submenuMenor").style.display="none";
    document.getElementById("btn-maior").classList.add("ativo");
  } else {
    listaAtual=ciclo.map(n=>n+"m");
    document.getElementById("submenuMenor").style.display="block";
    document.getElementById("btn-menor").classList.add("ativo");
  }

  iniciar();
}

function setModo(m){
  limparAtivos(["btn-quintas","btn-quartas","btn-cromA","btn-cromD"]);
  modo=m;
  document.getElementById(
    m==="quintas"?"btn-quintas":
    m==="quartas"?"btn-quartas":
    m==="cromaticoAsc"?"btn-cromA":"btn-cromD"
  ).classList.add("ativo");
}

function setMenorModo(m){
  limparAtivos(["btn-natural","btn-harmonica"]);
  menorModo=m;
  document.getElementById("btn-"+m).classList.add("ativo");
}

function iniciar(){
  embaralhadas=[...listaAtual];
  embaralhar(embaralhadas);
}

function embaralhar(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function gerarCiclo(t){

  if(modo.includes("cromatico")){
    const crom = ["C","C#","D","D#","E","F","F#","G","G#","A","Bb","B"];
    let base=t.replace("m","");
    let idx=crom.indexOf(base);
    let out=[];

    for(let i=0;i<12;i++){
      let pos = modo==="cromaticoAsc" ? (idx+i)%12 : (idx-i+12)%12;
      let nota=crom[pos];
      if(t.includes("m")) nota+="m";
      out.push(nota);
    }
    return out;
  }

  let i=listaAtual.indexOf(t);
  let out=[];

  for(let k=0;k<12;k++){
    let pos = modo==="quartas"
      ? (i-k+12)%12
      : (i+k)%12;

    out.push(listaAtual[pos]);
  }

  return out;
}

function sortear(){

  if(embaralhadas.length===0){
    document.getElementById("resultado").innerText="Fim";
    return;
  }

  let t=embaralhadas.pop();
  document.getElementById("resultado").innerText=t;

  let ciclo=gerarCiclo(t);

  let html="";

  ciclo.forEach(ton=>{
    html+=`<div style="margin-bottom:12px;"><b>${ton}</b> → ${campo(ton).join(" ")}</div>`;
  });

  document.getElementById("ciclo").innerHTML=html;
}

selecionar("maior");
setModo("quintas");

</script>

</body>
</html>
