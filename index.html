<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sorteador de Tonalidades</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 15px;
  background-color: #f9f9f9;
  color: #111;
}

h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

/* flags */
.flags {
  margin-bottom: 10px;
}
.flag {
  font-size: 24px;
  cursor: pointer;
  margin: 3px;
  padding: 5px;
  border-radius: 5px;
}
.flag.ativo {
  background-color: #222;
}

/* barra */
.barra {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin-bottom: 10px;
}

button {
  font-size: 16px;
  padding: 10px 14px;
  border-radius: 6px;
  border: 2px solid #444;
  background-color: white;
  cursor: pointer;
}

button:hover {
  background-color: #eaeaea;
}

.ativo {
  background-color: #222;
  color: white;
}

/* resultado */
#resultado {
  font-size: 42px;
  margin-top: 20px;
  font-weight: bold;
}

/* рҹ”Ҙ LISTA VERTICAL */
#ciclo {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;              /* controla espaГ§o entre linhas */
  font-size: 22px;       /* calibrado pra caber 12 linhas */
  line-height: 1.2;
}

/* cada item */
.item {
  padding: 2px 0;
}

/* destaque da tГҙnica */
.tonica {
  font-weight: bold;
  font-size: 26px;
}

/* mobile */
@media (max-width: 600px) {
  #ciclo {
    font-size: 20px;
  }
  .tonica {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div class="flags">
  <span class="flag ativo" onclick="setLang('pt')">рҹҮ§рҹҮ·</span>
  <span class="flag" onclick="setLang('en')">рҹҮ¬рҹҮ§</span>
  <span class="flag" onclick="setLang('es')">рҹҮӘрҹҮё</span>
  <span class="flag" onclick="setLang('fr')">рҹҮ«рҹҮ·</span>
  <span class="flag" onclick="setLang('de')">рҹҮ©рҹҮӘ</span>
  <span class="flag" onclick="setLang('it')">рҹҮ®рҹҮ№</span>
</div>

<h1 id="titulo">Sorteador de Tonalidades</h1>

<div class="barra">
  <button id="btn-maior" onclick="selecionar('maior')">Maiores</button>
  <button id="btn-menor" onclick="selecionar('menor')">Menores</button>

  <button id="btn-quintas" onclick="setModo('quintas')">Quintas</button>
  <button id="btn-quartas" onclick="setModo('quartas')">Quartas</button>

  <button onclick="setModo('cromaticoAsc')">Crom вҶ‘</button>
  <button onclick="setModo('cromaticoDesc')">Crom вҶ“</button>

  <button id="sortear" onclick="sortear()">Sortear</button>
</div>

<div id="resultado">вҖ”</div>
<div id="ciclo"></div>

<script>

// idiomas (simplificado)
let lang="pt";

// listas
let maiores=["C","G","D","A","E","B","FвҷҜ / Gвҷӯ","Dвҷӯ","Aвҷӯ","Eвҷӯ","Bвҷӯ","F"];
let menores=["Cm","Gm","Dm","Am","Em","Bm","FвҷҜm","CвҷҜm","GвҷҜm","DвҷҜm","AвҷҜm","Fm"];
let cromatico=["C","CвҷҜ / Dвҷӯ","D","DвҷҜ / Eвҷӯ","E","F","FвҷҜ / Gвҷӯ","G","GвҷҜ / Aвҷӯ","A","AвҷҜ / Bвҷӯ","B"];

let listaAtual=[];
let embaralhadas=[];
let modo="quintas";

function embaralhar(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function iniciar(){embaralhadas=[...listaAtual];embaralhar(embaralhadas);}
function selecionar(t){listaAtual=(t==="maior")?maiores:menores;iniciar();}
function setModo(m){modo=m;}

function gerarCiclo(t){
  let base=(modo.includes("cromatico"))?cromatico:listaAtual;
  let index=base.indexOf(t.replace("m",""));
  let ciclo=[];

  for(let i=0;i<base.length;i++){
    let pos;
    if(modo==="quintas") pos=(index+i)%base.length;
    else if(modo==="quartas") pos=(index-i+base.length)%base.length;
    else if(modo==="cromaticoAsc") pos=(index+i)%base.length;
    else pos=(index-i+base.length)%base.length;

    let nota=base[pos];
    if(listaAtual===menores && !modo.includes("cromatico")) nota+="m";
    ciclo.push(nota);
  }

  return ciclo;
}

function sortear(){
  if(embaralhadas.length===0){
    document.getElementById("resultado").innerText="Fim";
    return;
  }

  let t=embaralhadas.pop();
  document.getElementById("resultado").innerText=t;

  let ciclo=gerarCiclo(t);

  let html="";
  ciclo.forEach((n,i)=>{
    if(i===0){
      html+=`<div class="item tonica">${n}</div>`;
    } else {
      html+=`<div class="item">${n}</div>`;
    }
  });

  document.getElementById("ciclo").innerHTML=html;
}

listaAtual=maiores;
iniciar();

</script>

</body>
</html>
